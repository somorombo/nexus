<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Nexus Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#313338] text-white h-screen">

  <div id="auth-screen" class="flex items-center justify-center h-full">
    <div class="bg-[#2b2d31] p-8 rounded-lg w-80 border border-gray-700">
      <h2 id="title" class="text-xl font-bold mb-4 text-center">Nexus Giriş</h2>
      <input id="email" type="email" placeholder="E-posta" class="w-full p-2 mb-2 bg-[#1e1f22] rounded border border-gray-600">
      <input id="pass" type="password" placeholder="Şifre" class="w-full p-2 mb-4 bg-[#1e1f22] rounded border border-gray-600">
      <button id="btn" class="w-full bg-[#5865f2] p-2 rounded font-bold hover:bg-[#4752c4]">Giriş Yap</button>
      <p id="toggle" class="text-xs text-center mt-4 cursor-pointer text-gray-400 hover:underline">Kayıt Ol</p>
    </div>
  </div>

  <div id="app-screen" class="hidden flex h-full">
    <div class="w-64 bg-[#2b2d31] p-4">
      <h2 class="font-bold mb-4">Kanallar</h2>
      <button onclick="addRoom()" class="text-sm bg-green-600 w-full p-1 rounded">+ Yeni Oda</button>
      <div id="rooms" class="mt-4 space-y-2"></div>
    </div>
    <div class="flex-1 flex flex-col bg-[#313338]">
      <div id="messages" class="flex-1 p-4 overflow-y-auto"></div>
      <div class="p-4 flex gap-2">
        <input id="msg" class="flex-1 bg-[#1e1f22] p-2 rounded" placeholder="Mesaj yaz...">
        <button id="send" class="bg-[#5865f2] px-4 rounded">Gönder</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const config = {
      apiKey: "AIzaSyA4LiP5506uWaX4h7b6TyuAdxxYTNMJ4aw",
      authDomain: "nexus-f439d.firebaseapp.com",
      projectId: "nexus-f439d",
      storageBucket: "nexus-f439d.firebasestorage.app",
      messagingSenderId: "223527974037",
      appId: "1:223527974037:web:91c740810a2aa4c2bc179c",
      databaseURL: "https://nexus-f439d-default-rtdb.firebaseio.com"
    };

    const app = initializeApp(config);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        loadRooms();
      }
    });

    document.getElementById('btn').onclick = () => {
      const e = document.getElementById('email').value;
      const p = document.getElementById('pass').value;
      const isLogin = document.getElementById('title').innerText === "Nexus Giriş";
      if(isLogin) signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
      else createUserWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
    };

    document.getElementById('toggle').onclick = () => {
      const t = document.getElementById('title');
      t.innerText = t.innerText === "Nexus Giriş" ? "Nexus Kayıt" : "Nexus Giriş";
      document.getElementById('btn').innerText = t.innerText === "Nexus Giriş" ? "Giriş Yap" : "Kayıt Ol";
    };

    window.addRoom = () => {
      const name = prompt("Oda adı:");
      if(name) set(push(ref(db, 'rooms')), { name });
    };

    function loadRooms() {
      onValue(ref(db, 'rooms'), (s) => {
        const r = document.getElementById('rooms');
        r.innerHTML = '';
        s.forEach(c => {
          const div = document.createElement('div');
          div.className = "cursor-pointer hover:text-blue-400";
          div.innerText = "# " + c.val().name;
          div.onclick = () => { window.activeRoom = c.key; loadMessages(); };
          r.appendChild(div);
        });
      });
    }

    function loadMessages() {
      onValue(ref(db, 'messages/' + window.activeRoom), (s) => {
        const m = document.getElementById('messages');
        m.innerHTML = '';
        s.forEach(c => {
          m.innerHTML += `<div class="bg-[#2b2d31] p-2 rounded"><b>${c.val().sender}:</b> ${c.val().text}</div>`;
        });
      });
    }

    document.getElementById('send').onclick = () => {
      if(!window.activeRoom) return alert("Oda seç!");
      const m = document.getElementById('msg');
      set(push(ref(db, 'messages/' + window.activeRoom)), { sender: auth.currentUser.email.split('@')[0], text: m.value });
      m.value = '';
    };
  </script>
</body>
</html>
