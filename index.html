<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Nexus Chat Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#313338] text-white h-screen overflow-hidden">

  <div id="auth-screen" class="flex items-center justify-center h-full">
    <div class="bg-[#2b2d31] p-8 rounded-lg w-80 border border-gray-700">
      <h2 id="title" class="text-xl font-bold mb-4 text-center">Nexus Giriş</h2>
      <input id="email" type="email" placeholder="E-posta" class="w-full p-2 mb-2 bg-[#1e1f22] rounded">
      <input id="pass" type="password" placeholder="Şifre" class="w-full p-2 mb-4 bg-[#1e1f22] rounded">
      <button id="btn" class="w-full bg-[#5865f2] p-2 rounded font-bold">Giriş Yap</button>
      <p id="toggle" class="text-xs text-center mt-4 cursor-pointer text-gray-400">Hesabın yok mu? Kayıt Ol</p>
    </div>
  </div>

  <div id="app-screen" class="hidden flex h-full">
    <div class="w-64 bg-[#2b2d31] p-4 flex flex-col">
      <h2 class="font-bold mb-4">Kanallar</h2>
      <button onclick="addRoom()" class="text-sm bg-green-600 w-full p-2 rounded mb-4">+ Yeni Oda</button>
      <div id="rooms" class="flex-1 space-y-2 overflow-y-auto"></div>
    </div>
    <div class="flex-1 flex flex-col bg-[#313338]">
      <div id="messages" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
      <div class="p-4 flex gap-2">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <button onclick="document.getElementById('fileInput').click()" class="bg-gray-700 px-3 rounded">📎</button>
        <input id="msg" class="flex-1 bg-[#1e1f22] p-2 rounded" placeholder="Mesaj yaz...">
        <button id="send" class="bg-[#5865f2] px-4 rounded">Gönder</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({
      apiKey: "AIzaSyA4LiP5506uWaX4h7b6TyuAdxxYTNMJ4aw",
      authDomain: "nexus-f439d.firebaseapp.com",
      databaseURL: "https://nexus-f439d-default-rtdb.firebaseio.com",
      projectId: "nexus-f439d",
      storageBucket: "nexus-f439d.firebasestorage.app",
      messagingSenderId: "223527974037",
      appId: "1:223527974037:web:91c740810a2aa4c2bc179c"
    }));
    const auth = getAuth();

    // --- Fonksiyonlar ---
    window.selectRoom = (id) => { localStorage.setItem('activeRoom', id); loadMessages(); };
    window.delR = (id) => remove(ref(db, 'rooms/' + id));
    window.delM = (id) => remove(ref(db, 'messages/' + localStorage.getItem('activeRoom') + '/' + id));

    onAuthStateChanged(auth, (u) => {
      if (u) {
        document.getElementById('auth-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
        loadRooms();
      }
    });

    function loadRooms() {
      onValue(ref(db, 'rooms'), (s) => {
        const r = document.getElementById('rooms');
        r.innerHTML = '';
        s.forEach(c => {
          const d = document.createElement('div');
          d.className = "flex justify-between p-2 bg-[#36373d] rounded cursor-pointer";
          d.innerHTML = `<span onclick="selectRoom('${c.key}')"># ${c.val().name}</span>
                         <button onclick="delR('${c.key}')" class="text-red-500 font-bold">x</button>`;
          r.appendChild(d);
        });
      });
    }

    function loadMessages() {
      const room = localStorage.getItem('activeRoom');
      if (!room) return;
      onValue(ref(db, 'messages/' + room), (s) => {
        const m = document.getElementById('messages');
        m.innerHTML = '';
        s.forEach(c => {
          const v = c.val();
          m.innerHTML += `<div class="bg-[#2b2d31] p-2 rounded flex justify-between">
            <div><b>${v.sender}:</b> ${v.text || `<img src="${v.img}" class="w-32">`}</div>
            <button onclick="delM('${c.key}')" class="text-red-500">Sil</button>
          </div>`;
        });
      });
    }

    document.getElementById('send').onclick = () => {
      const room = localStorage.getItem('activeRoom');
      if(!room) return alert("Önce bir oda seç!");
      set(push(ref(db, 'messages/' + room)), { sender: auth.currentUser.email.split('@')[0], text: document.getElementById('msg').value });
      document.getElementById('msg').value = '';
    };

    document.getElementById('fileInput').onchange = (e) => {
      const room = localStorage.getItem('activeRoom');
      if(!room) return alert("Önce bir oda seç!");
      const r = new FileReader();
      r.onload = (e) => set(push(ref(db, 'messages/' + room)), { sender: auth.currentUser.email.split('@')[0], img: e.target.result });
      r.readAsDataURL(e.target.files[0]);
    };

    document.getElementById('btn').onclick = () => {
      const e = document.getElementById('email').value, p = document.getElementById('pass').value;
      if(document.getElementById('title').innerText === "Nexus Giriş") signInWithEmailAndPassword(auth, e, p).catch(alert);
      else createUserWithEmailAndPassword(auth, e, p).catch(alert);
    };

    document.getElementById('toggle').onclick = () => {
      const t = document.getElementById('title');
      t.innerText = t.innerText === "Nexus Giriş" ? "Nexus Kayıt" : "Nexus Giriş";
      document.getElementById('btn').innerText = t.innerText === "Nexus Giriş" ? "Giriş Yap" : "Kayıt Ol";
    };

    window.addRoom = () => { const n = prompt("Oda adı:"); if(n) set(push(ref(db, 'rooms')), { name: n }); };
  </script>
</body>
</html>
