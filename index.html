<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Nexus Chat Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#313338] text-white h-screen overflow-hidden">

  <div id="auth-screen" class="flex items-center justify-center h-full">
    <div class="bg-[#2b2d31] p-8 rounded-lg w-80 border border-gray-700">
      <h2 id="title" class="text-xl font-bold mb-4 text-center">Nexus Giriş</h2>
      <input id="email" type="email" placeholder="E-posta" class="w-full p-2 mb-2 bg-[#1e1f22] rounded">
      <input id="pass" type="password" placeholder="Şifre" class="w-full p-2 mb-4 bg-[#1e1f22] rounded">
      <button id="btn" class="w-full bg-[#5865f2] p-2 rounded font-bold">Giriş Yap</button>
    </div>
  </div>

  <div id="app-screen" class="hidden flex h-full">
    <div class="w-64 bg-[#2b2d31] p-4 flex flex-col">
      <h2 class="font-bold mb-4">Kanallar</h2>
      <div id="rooms" class="flex-1 space-y-2 overflow-y-auto"></div>
      <button onclick="addRoom()" class="text-sm bg-green-600 p-2 rounded mt-2">+ Yeni Oda</button>
    </div>
    <div class="flex-1 flex flex-col bg-[#313338]">
      <div id="messages" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
      <div class="p-4 flex gap-2">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <button onclick="document.getElementById('fileInput').click()" class="bg-gray-600 px-3 rounded">📎</button>
        <input id="msg" class="flex-1 bg-[#1e1f22] p-2 rounded" placeholder="Mesaj veya GIF linki...">
        <button id="send" class="bg-[#5865f2] px-4 rounded">Gönder</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const db = getDatabase(initializeApp({ /* ... config aynı ... */ }));
    const auth = getAuth();
    let activeRoom = null;

    // Mesaj/Resim Gönderme
    document.getElementById('send').onclick = () => {
      const m = document.getElementById('msg');
      if(m.value) set(push(ref(db, 'messages/' + activeRoom)), { sender: auth.currentUser.email.split('@')[0], text: m.value });
      m.value = '';
    };

    document.getElementById('fileInput').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = (r) => set(push(ref(db, 'messages/' + activeRoom)), { sender: auth.currentUser.email.split('@')[0], img: r.target.result });
      reader.readAsDataURL(e.target.files[0]);
    };

    // Oda/Mesaj Silme Fonksiyonları
    window.deleteRoom = (id) => remove(ref(db, 'rooms/' + id));
    window.deleteMsg = (id) => remove(ref(db, 'messages/' + activeRoom + '/' + id));

    // Liste Yükleyiciler (Silme butonlarıyla beraber)
    function loadMessages() {
      onValue(ref(db, 'messages/' + activeRoom), (s) => {
        const m = document.getElementById('messages');
        m.innerHTML = '';
        s.forEach(c => {
          const msg = c.val();
          m.innerHTML += `<div class="bg-[#2b2d31] p-2 rounded flex justify-between">
            <div><b>${msg.sender}:</b> ${msg.text || `<img src="${msg.img}" class="max-w-[200px]">`}</div>
            <button onclick="deleteMsg('${c.key}')" class="text-red-500">🗑️</button>
          </div>`;
        });
      });
    }
    
    // loadRooms içine de benzer şekilde <button onclick="deleteRoom('${c.key}')">🗑️</button> eklenebilir.
  </script>
</body>
</html>
